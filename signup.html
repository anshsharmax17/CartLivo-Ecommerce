<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CartLivo | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="logo" href="index.html">CartLivo</a>
        <a class="btn btn-ghost" href="index.html">Back to Store</a>
      </div>
    </header>

    <main class="auth-layout container">
      <section class="auth-card" aria-labelledby="signupHeading">
        <p class="eyebrow">Create Account</p>
        <h1 id="signupHeading">Join CartLivo</h1>
        <p class="subtext">
          Create your account to save favorites, track orders, and checkout faster.
        </p>

        <!-- Signup form -->
        <form id="signupForm" novalidate>
          <div class="field">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" placeholder="John Doe" required />
            <small class="error" id="fullNameError"></small>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="john@example.com" required />
            <small class="error" id="emailError"></small>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter password" required />
            <small class="error" id="passwordError"></small>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              placeholder="Re-enter password"
              required
            />
            <small class="error" id="confirmPasswordError"></small>
          </div>

          <p id="formMessage" class="form-message" aria-live="polite"></p>

          <button class="btn btn-primary btn-block" type="submit">Create Account</button>
        </form>

        <p class="bottom-text">
          Already have an account?
          <a href="login.html">Go to Login</a>
        </p>
      </section>
    </main>

    <script src="js/signup.js"></script>
  </body>
</html>
